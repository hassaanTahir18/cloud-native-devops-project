apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification-app
        image: notification-service:local
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: ENV_MODE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: notification